[run.claude]
alias = "claude --dangerously-skip-permissions"

[run.codex]
alias = "codex --yolo"

[loop.claude]
runner = "claude -p '@%{PROMPT_FILE}'"

[loop.pi]
runner = "agm run pi -p '@%{PROMPT_FILE}'"

# [exec] — AgL workflow runner settings (agm exec).
# Uncomment and adjust as needed; all fields are optional.
#
# [exec]
# runner = "claude -p"          # default agent runner (falls back to [loop] runner)
# strict_json = false           # require bare JSON from agents (default: lenient recovery)
# default_loop_limit = 5        # do[] iteration bound when not specified inline
# timeout = "30m"               # idle timeout for agent and exec() calls
# log = false                   # trace logging; off by default — set true to enable
# log_file = "trace.jsonl"      # explicit trace path (omit for auto timestamped path)
#
# [exec.agents]                 # per-agent runner commands (highest precedence)
# reviewer = "claude -p"

# [repl] — AgL REPL settings (agm repl).
#
# [repl]
# theme = "auto"    # syntax-highlighting theme: "dark", "light", or "auto" (detect from $COLORFGBG)

# [params.<program>] — default param values for an AgL program (agm exec).
#
# The table key is the name from the program's ``program NAME`` declaration, or
# the .agl file stem when no ``program`` declaration is present.  CLI options
# (e.g. ``--topic``) override config values; config values suppress the param's
# default expression.  Inline ``-c`` programs with no ``program`` declaration
# have no config table.
#
# [params.review_workflow]
# topic    = "security"         # text param — verbatim string
# verbose  = true               # bool param — native TOML bool
# max_iter = 3                  # int param  — native TOML integer
# tags     = ["bug", "audit"]   # list param — TOML array (or a JSON string)
# ratio    = "0.75"             # decimal param — MUST be a quoted string;
#                               #   a bare TOML float (0.75) is rejected because
#                               #   AgL forbids binary floating-point values.
